name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "GIT COMMIT:"
          git rev-parse --short HEAD
          echo "HANDLER HEAD:"
          head -40 handler.py

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          docker build \
            -t ghcr.io/kobyla1993-beep/wan-runpod-worker:latest \
            -t ghcr.io/kobyla1993-beep/wan-runpod-worker:${COMMIT_SHA} \
            -f Dockerfile .

      - name: Push Docker image latest
        run: |
          docker push ghcr.io/kobyla1993-beep/wan-runpod-worker:latest

      - name: Push Docker image commit tag
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          docker push ghcr.io/kobyla1993-beep/wan-runpod-worker:${COMMIT_SHA}